# Local debugging in Docker — host setup is documented in README.md
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      BIND_ADDR: 0.0.0.0
      MAILEXAM_LOGIN: ${MAILEXAM_LOGIN}
      MAILEXAM_PASSWORD: ${MAILEXAM_PASSWORD}
      MAILEXAM_PORT: ${MAILEXAM_PORT:-587}
      MAIL_FROM: ${MAIL_FROM:-noreply@example.test}
